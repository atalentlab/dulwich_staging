<script type="text/javascript" defer> 
  (function() {
      'use strict';
      
      // Initialize Zoho tracker
      var zfutm_zfAdvLead = new ZFAdvLead();
      zfutm_zfAdvLead.zfautm_ini();
      
      // Track processed iframes to avoid duplicate params
      var processedIframes = new WeakSet();
      
      // Override the original iframeSprt to track processed ones
      var originalIframeSprt = ZFAdvLead.prototype.zfautm_iframeSprt;
      
      ZFAdvLead.prototype.zfautm_iframeSprt = function() {
          var zf_frame = document.getElementsByTagName("iframe");
          
          for(var i = 0; i < zf_frame.length; ++i){
              if((zf_frame[i].src).indexOf('formperma') > 0 ){
                  // Skip if already processed
                  if (processedIframes.has(zf_frame[i])) continue;
                  
                  var zf_src = zf_frame[i].src;
                  var modified = false;
                  
                  for( var prmIdx = 0 ; prmIdx < ZFAdvLead.utmPNameArr.length ; prmIdx ++ ) {
                      var utmPm = ZFAdvLead.utmPNameArr[ prmIdx ];
                      utmPm = ( ZFAdvLead.isSameDomian && ( ZFAdvLead.utmcustPNameArr.indexOf(utmPm) == -1 ) ) ? "zf_" + utmPm : utmPm;
                      
                      // Use the correct method to get cookie value
                      var utmVal = this.zfautm_gC_enc( ZFAdvLead.utmPNameArr[ prmIdx ] );
                      
                      if ( typeof utmVal !== "undefined" && utmVal != "" ) {
                          // Only add if not already present
                          if(zf_src.indexOf(utmPm + '=') === -1){
                              if(zf_src.indexOf('?') > 0){
                                  zf_src = zf_src + '&' + utmPm + '=' + utmVal;
                              } else {
                                  zf_src = zf_src + '?' + utmPm + '=' + utmVal;
                              }
                              modified = true;
                          }
                      }
                  }
                  
                  if (modified && zf_frame[i].src.length < zf_src.length) {
                      zf_frame[i].src = zf_src;
                      processedIframes.add(zf_frame[i]);
                      console.log('ZFAdvLead: Updated iframe with UTMs');
                  }
              }
          }
      };
      
      // Function to run the update
      function runUpdate() {
          zfutm_zfAdvLead.zfautm_iframeSprt();
          zfutm_zfAdvLead.zfautm_DHtmlSprt();
      }
      
      // Run immediately
      runUpdate();
      
      // MutationObserver for dynamically added iframes
      var domObserver = new MutationObserver(function(mutations) {
          var shouldUpdate = false;
          
          mutations.forEach(function(mutation) {
              mutation.addedNodes.forEach(function(node) {
                  if (node.nodeType === 1) {
                      if (node.tagName === 'IFRAME' && node.src && node.src.indexOf('formperma') > -1) {
                          shouldUpdate = true;
                      }
                      if (node.querySelectorAll && node.querySelector('iframe[src*="formperma"]')) {
                          shouldUpdate = true;
                      }
                  }
              });
          });
          
          if (shouldUpdate) {
              setTimeout(runUpdate, 100);
          }
      });
      
      // IntersectionObserver for lazy-loaded iframes
      var visibilityObserver = new IntersectionObserver(function(entries) {
          entries.forEach(function(entry) {
              if (entry.isIntersecting) {
                  setTimeout(runUpdate, 100);
              }
          });
      }, { threshold: 0.1 });
      
      // Initialize observers
      function init() {
          if (!document.body) return;
          
          domObserver.observe(document.body, { childList: true, subtree: true });
          
          var iframes = document.getElementsByTagName('iframe');
          for (var i = 0; i < iframes.length; i++) {
              visibilityObserver.observe(iframes[i]);
          }
      }
      
      init();
      
      // Backup interval for lazy loading
      var intervalId = setInterval(runUpdate, 1000);
      setTimeout(function() { clearInterval(intervalId); }, 30000);
      
      // Handle Next.js navigation
      window.addEventListener('popstate', function() {
          processedIframes = new WeakSet();
          setTimeout(runUpdate, 500);
      });
      
  })();
  </script>

<script type="text/javascript"> 
function addOpenApplyUTMToIframes() {
    // UTM parameters to capture and pass
    var utmParams = ['utm_source', 'utm_medium', 'utm_campaign', 'utm_term', 'utm_content'];
    
    // Get current page URL parameters
    var urlParams = new URLSearchParams(window.location.search);
    
    // Build UTM string from current page
    var utmString = '';
    utmParams.forEach(function(param) {
        var value = urlParams.get(param);
        if (value) {
            utmString += (utmString ? '&' : '?') + param + '=' + encodeURIComponent(value);
        }
    });
    
    // Also check cookies if URL params not present (for cross-page persistence)
    if (!utmString) {
        utmParams.forEach(function(param) {
            var cookieMatch = document.cookie.match(new RegExp('(^| )' + param + '=([^;]+)'));
            if (cookieMatch) {
                utmString += (utmString ? '&' : '?') + param + '=' + encodeURIComponent(cookieMatch[2]);
            }
        });
    }
    
    // Find all OpenApply iframes
    var iframes = document.querySelectorAll('iframe[src*="openapply.com"], iframe[src*="openapply.cn"]');
    
    iframes.forEach(function(iframe) {
        var originalSrc = iframe.src;
        
        // Skip if already has UTM params
        if (originalSrc.indexOf('utm_source') > -1) {
            return;
        }
        
        // Append UTM params to iframe src
        var separator = originalSrc.indexOf('?') > -1 ? '&' : '?';
        iframe.src = originalSrc + separator + utmString;
    });
}

// Run on page load
if (document.readyState === 'complete') {
    addOpenApplyUTMToIframes();
} else {
    window.addEventListener('load', addOpenApplyUTMToIframes, false);
}
</script>
